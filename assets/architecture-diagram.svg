<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" role="img" aria-label="Email Marketing Agent architecture">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eff6ff"/>
      <stop offset="100%" style="stop-color:#dbeafe"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f3ff"/>
      <stop offset="100%" style="stop-color:#ede9fe"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdf4"/>
      <stop offset="100%" style="stop-color:#dcfce7"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#64748b"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="920" height="520" fill="#ffffff" rx="12"/>

  <!-- Title -->
  <text x="460" y="36" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" fill="#0f172a">Email Marketing Agent  System Architecture</text>
  <text x="460" y="58" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#64748b">Phase 1</text>

  <!-- Auth -->
  <g filter="url(#shadow)">
    <rect x="40" y="88" width="160" height="72" rx="10" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
    <text x="120" y="114" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#c2410c">core.dextr.ai</text>
    <text x="120" y="132" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">sign-in-with-services</text>
    <text x="120" y="148" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8">JWT + product list</text>
  </g>

  <!-- Dashboard -->
  <g filter="url(#shadow)">
    <rect x="40" y="200" width="160" height="100" rx="10" fill="url(#blueGrad)" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="120" y="228" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#1e40af">Marketing UI</text>
    <rect x="60" y="242" width="120" height="44" rx="6" fill="#ffffff" stroke="#bfdbfe"/>
    <text x="120" y="262" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#2563eb">Dashboard</text>
    <text x="120" y="278" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">Chat · Templates · Preview</text>
  </g>

  <!-- marketing-svc main box -->
  <g filter="url(#shadow)">
    <rect x="280" y="88" width="360" height="280" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <text x="460" y="116" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#0f172a">dextr-marketing-svc</text>

    <!-- REST API -->
    <rect x="360" y="132" width="200" height="44" rx="8" fill="#2563eb"/>
    <text x="460" y="160" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#ffffff">REST APIs</text>

    <!-- Internal services row -->
    <rect x="300" y="200" width="100" height="56" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="350" y="224" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#334155">Campaigns</text>
    <text x="350" y="240" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8">+ Chat</text>

    <rect x="410" y="200" width="100" height="56" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="460" y="224" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#334155">Onboard</text>
    <text x="460" y="240" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8">+ Hotels</text>

    <rect x="520" y="200" width="100" height="56" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="570" y="224" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#334155">Send</text>
    <text x="570" y="240" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8">+ Track</text>

    <!-- Jobs -->
    <rect x="360" y="276" width="200" height="36" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="460" y="298" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">Background jobs  scrape · send</text>

    <!-- Postgres inside -->
    <ellipse cx="350" cy="340" rx="44" ry="18" fill="#e0f2fe" stroke="#7dd3fc"/>
    <text x="350" y="344" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#0369a1">Postgres</text>

    <!-- SES inside -->
    <rect x="430" y="322" width="80" height="36" rx="6" fill="#fef3c7" stroke="#fcd34d"/>
    <text x="470" y="344" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#b45309">AWS SES</text>
  </g>

  <!-- deepagent -->
  <g filter="url(#shadow)">
    <rect x="700" y="140" width="180" height="160" rx="12" fill="url(#purpleGrad)" stroke="#c4b5fd" stroke-width="1.5"/>
    <text x="790" y="170" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#5b21b6">deepagent</text>
    <rect x="720" y="186" width="140" height="32" rx="6" fill="#ffffff" stroke="#ddd6fe"/>
    <text x="790" y="206" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#6d28d9">Website scrape</text>
    <rect x="720" y="226" width="140" height="32" rx="6" fill="#ffffff" stroke="#ddd6fe"/>
    <text x="790" y="246" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#6d28d9">Fill template JSON</text>
    <rect x="720" y="266" width="140" height="32" rx="6" fill="#ffffff" stroke="#ddd6fe"/>
    <text x="790" y="286" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#6d28d9">Chat HTML edits</text>
  </g>

  <!-- S3 -->
  <g filter="url(#shadow)">
    <ellipse cx="460" cy="440" rx="56" ry="22" fill="url(#greenGrad)" stroke="#86efac" stroke-width="1.5"/>
    <text x="460" y="436" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#15803d">S3</text>
    <text x="460" y="450" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">Images · HTML</text>
  </g>

  <!-- Arrows -->
  <!-- Auth to Dashboard -->
  <line x1="120" y1="160" x2="120" y2="198" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="132" y="182" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8">JWT</text>

  <!-- Dashboard to API -->
  <line x1="200" y1="250" x2="358" y2="154" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="268" y="192" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">HTTPS</text>

  <!-- API to deepagent bidirectional -->
  <path d="M560,154 C620,154 640,220 698,220" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M698,240 C640,240 620,176 560,176" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="630" y="168" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8">AI jobs</text>

  <!-- API to S3 -->
  <line x1="460" y1="368" x2="460" y2="416" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Recipients -->
  <g filter="url(#shadow)">
    <rect x="40" y="400" width="160" height="56" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="120" y="424" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#334155">Hotel guests</text>
    <text x="120" y="442" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8">Campaign recipients</text>
  </g>
  <path d="M470,344 C400,380 200,400 200,428" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="320" y="392" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">Email</text>

  <!-- Legend -->
  <rect x="680" y="400" width="200" height="88" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="700" y="422" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#334155">Legend</text>
  <rect x="700" y="432" width="12" height="12" rx="2" fill="#2563eb"/>
  <text x="718" y="442" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">Core service</text>
  <rect x="700" y="450" width="12" height="12" rx="2" fill="#7c3aed"/>
  <text x="718" y="460" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">AI (deepagent)</text>
  <rect x="700" y="468" width="12" height="12" rx="2" fill="#f59e0b"/>
  <text x="718" y="478" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">Email delivery (SES)</text>
</svg>
